<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #1a1a1a, #050505 75%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    overflow: hidden;
}

/* ✨ Stars */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.8;
    animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.6); }
}

/* 🌙 PERFECT CRESCENT */
.moon {
    position: absolute;
    top: 70px;
    right: 100px;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffffff, #dcdcdc 70%);
    box-shadow: 0 0 50px rgba(255,255,255,0.15);
    transform: rotate(-35deg);
    overflow: hidden;
}

.moon::after {
    content: "";
    position: absolute;
    top: -20px;
    left: 60px;
    width: 130px;
    height: 130px;
    background: #050505;
    border-radius: 50%;
}

/* ✨ Content */
.container {
    text-align: center;
    z-index: 2;
}

/* Button */
button {
    padding: 14px 32px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

button:hover {
    background: #fff;
    color: #000;
    transform: scale(1.05);
}

/* Card */
.card {
    margin-top: 25px;
    width: 320px;
    padding: 26px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border-radius: 24px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: all 0.5s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

.card h1 {
    font-size: 21px;
    margin-bottom: 14px;
    font-weight: 600;
}

.card p {
    font-size: 13.5px;
    line-height: 1.7;
    color: #ddd;
    margin-bottom: 10px;
}

/* Prevent ugly line breaks */
.no-break {
    white-space: nowrap;
}

/* Fade in */
.fade-in {
    animation: fade 1.2s ease forwards;
    opacity: 0;
}

@keyframes fade {
    to { opacity: 1; }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="moon"></div>

<div class="container fade-in">
    <button onclick="toggleCard()" id="btn">Touch Me</button>

    <div class="card" id="card">
        <h1>Eid Mubarak, Honey 🖤</h1>
        <p>I felt, 50 tk salami is cute but not enough. So, here we are!</p>
        <p>
            Another eid without you,
            <span class="no-break">Next Eid-ul-Fitr... no distance.</span>
            Deal?
        </p>
    </div>
</div>

<script>
const card = document.getElementById("card");
const btn = document.getElementById("btn");

function toggleCard() {
    card.classList.toggle("show");

    if (card.classList.contains("show")) {
        btn.innerText = "Close";
    } else {
        btn.innerText = "Touch Me";
    }
}

/* Stars generator */
const starsContainer = document.getElementById("stars");

for (let i = 0; i < 90; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 3 + "s";
    starsContainer.appendChild(star);
}
</script>

</body>
</html>
