<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #1a1a1a, #0a0a0a 70%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    overflow: hidden;
}

/* ✨ Stars */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.8;
    animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.8); }
}

/* 🌙 Crescent Moon */
.moon {
    position: absolute;
    top: 80px;
    right: 120px;
    width: 140px;
    height: 140px;
    background: #f1f1f1;
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(255,255,255,0.25);
    transform: rotate(-30deg);
}

.moon::after {
    content: "";
    position: absolute;
    top: 0;
    left: 40px;
    width: 140px;
    height: 140px;
    background: #0a0a0a;
    border-radius: 50%;
}

/* ✨ Center Content */
.container {
    text-align: center;
    z-index: 2;
}

/* Button */
button {
    padding: 14px 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

button:hover {
    background: #fff;
    color: #000;
    transform: scale(1.05);
}

/* Card */
.card {
    margin-top: 25px;
    width: 320px;
    padding: 28px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: all 0.6s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

.card h1 {
    font-size: 22px;
    margin-bottom: 16px;
    font-weight: 600;
}

.card p {
    font-size: 13.5px;
    line-height: 1.7;
    color: #ddd;
    margin-bottom: 10px;
}

/* Subtle fade-in on load */
.fade-in {
    animation: fade 1.5s ease forwards;
    opacity: 0;
}

@keyframes fade {
    to { opacity: 1; }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="moon"></div>

<div class="container fade-in">
    <button onclick="showCard()">Touch Me</button>

    <div class="card" id="card">
        <h1>Eid Mubarak, Honey 🖤</h1>
        <p>I felt, 50 tk salami is cute but not enough. So, here we are!</p>
        <p>Another eid without you, Next Eid-ul-Fitr... no distance. Deal?</p>
    </div>
</div>

<script>
function showCard() {
    document.getElementById("card").classList.add("show");
}

/* Generate random stars */
const starsContainer = document.getElementById("stars");

for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 3 + "s";
    starsContainer.appendChild(star);
}
</script>

</body>
</html>
